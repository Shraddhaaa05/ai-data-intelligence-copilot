[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning

[flake8]
max-line-length = 100
exclude = .venv,__pycache__,.git,notebooks
ignore = E501,W503
